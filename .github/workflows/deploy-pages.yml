# Build Sphinx HTML and publish to GitHub Pages (source stays on main; no committed _build).
name: Deploy documentation to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install dependencies
        run: pip install -r requirements-docs.txt

      - name: Build HTML
        working-directory: source
        env:
          # Project site URL: https://<owner>.github.io/<repo>/
          SPHINXOPTS: >-
            -D html_baseurl=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: make html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: source/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
