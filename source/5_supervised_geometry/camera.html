<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinhole Camera Interactive Demo</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #labels { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .label { 
            position: absolute; 
            background: rgba(20, 20, 30, 0.85); 
            color: #fff;
            padding: 6px 10px; 
            border-radius: 6px; 
            font-size: 13px; 
            transform: translate(-50%, -50%); 
            border: 1px solid #4a4a6a; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #aaa;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div id="labels">
        <div id="label-pinhole" class="label">Pinhole (Center of Projection)</div>
        <div id="label-imageplane" class="label">Image Plane</div>
        <div id="label-focal" class="label" style="color: #4db8ff;">Focal Length (f)</div>
    </div>
    
    <div id="instructions">
        <strong>Controls:</strong><br>
        Left Click + Drag: Orbit Scene<br>
        Right Click + Drag: Pan<br>
        Scroll: Zoom
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>

    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        
        // Main camera for the student to observe the scene
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(40, 30, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 0, 0);

        // Grid and Optical Axis
        const grid = new THREE.GridHelper(80, 80, 0x444444, 0x222222);
        grid.position.y = -15;
        scene.add(grid);

        const axisMaterial = new THREE.LineBasicMaterial({ color: 0x666666 });
        const axisGeometry = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, 0, -40),
            new THREE.Vector3(0, 0, 40)
        ]);
        const opticalAxis = new THREE.Line(axisGeometry, axisMaterial);
        scene.add(opticalAxis);

        // 2. Core Pinhole Components
        
        // The Pinhole (Origin)
        const pinholeGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const pinholeMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
        const pinhole = new THREE.Mesh(pinholeGeo, pinholeMat);
        scene.add(pinhole);

        // The Image Plane
        const planeGeo = new THREE.PlaneGeometry(30, 30);
        const planeMat = new THREE.MeshBasicMaterial({ color: 0x4db8ff, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
        const imagePlane = new THREE.Mesh(planeGeo, planeMat);
        scene.add(imagePlane);

        // Border for the image plane
        const planeBorderGeo = new THREE.EdgesGeometry(planeGeo);
        const planeBorderMat = new THREE.LineBasicMaterial({ color: 0x4db8ff });
        const planeBorder = new THREE.LineSegments(planeBorderGeo, planeBorderMat);
        imagePlane.add(planeBorder);

        // 3. 3D Objects Setup
        const objects = [];

        function createSceneObject(geometry, color, initialPos) {
            // Original Solid Object
            const material = new THREE.MeshLambertMaterial({ color: color });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(initialPos);
            scene.add(mesh);

            // Projected 2D Counterpart (Wireframe on the image plane)
            const projMaterial = new THREE.MeshBasicMaterial({ color: color, wireframe: true });
            const projMesh = new THREE.Mesh(geometry.clone(), projMaterial);
            scene.add(projMesh);

            // Rays (Lines connecting original vertices through pinhole to projected vertices)
            const lineCount = geometry.attributes.position.count;
            const linesGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(lineCount * 2 * 3); 
            linesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const linesMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.3 });
            const linesMesh = new THREE.LineSegments(linesGeo, linesMat);
            scene.add(linesMesh);

            objects.push({ original: mesh, projected: projMesh, lines: linesMesh });
        }

        // Lighting
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(20, 30, -20);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Create a Box and a Cone (asymmetrical layout to clearly show inversion)
        createSceneObject(new THREE.BoxGeometry(5, 5, 5), 0x00ff88, new THREE.Vector3(-6, 8, -20));
        createSceneObject(new THREE.ConeGeometry(3, 8, 16), 0xff4444, new THREE.Vector3(6, -4, -25));

        // 4. GUI & State Management
        const state = {
            focalLength: 12,
            boxX: -6, boxY: 8, boxZ: -20,
            coneX: 6, coneY: -4, coneZ: -25
        };

        const gui = new dat.GUI({ width: 300 });
        gui.add(state, 'focalLength', 5, 30).name('Focal Length (f)');

        const folderBox = gui.addFolder('Green Box (World Coordinates)');
        folderBox.add(state, 'boxX', -20, 20).name('X Position');
        folderBox.add(state, 'boxY', -20, 20).name('Y Position');
        folderBox.add(state, 'boxZ', -40, -10).name('Depth (Z) Position');
        folderBox.open();

        const folderCone = gui.addFolder('Red Cone (World Coordinates)');
        folderCone.add(state, 'coneX', -20, 20).name('X Position');
        folderCone.add(state, 'coneY', -20, 20).name('Y Position');
        folderCone.add(state, 'coneZ', -40, -10).name('Depth (Z) Position');
        folderCone.open();

        // 5. Mathematical Projection Logic
        function updateProjections() {
            // Move the image plane based on focal length
            imagePlane.position.z = state.focalLength;

            // Sync original objects to GUI state
            objects[0].original.position.set(state.boxX, state.boxY, state.boxZ);
            objects[1].original.position.set(state.coneX, state.coneY, state.coneZ);

            objects.forEach(obj => {
                obj.original.updateMatrixWorld();

                const origPositions = obj.original.geometry.attributes.position.array;
                const projPositions = obj.projected.geometry.attributes.position.array;
                const linePositions = obj.lines.geometry.attributes.position.array;

                for (let i = 0; i < origPositions.length; i += 3) {
                    // Convert local vertex to world space
                    const localVec = new THREE.Vector3(origPositions[i], origPositions[i+1], origPositions[i+2]);
                    const worldVec = localVec.clone().applyMatrix4(obj.original.matrixWorld);

                    // --- CORE COMPUTER VISION MATH ---
                    // By similar triangles, the projection ratio is (Focal Length / Object Depth)
                    // Note: Depth is negative in this right-handed setup, so we divide by absolute Z
                    const scale = state.focalLength / Math.abs(worldVec.z); 
                    
                    // In a physical pinhole camera, images are inverted: (x, y) -> (-x * scale, -y * scale)
                    const projX = -worldVec.x * scale;
                    const projY = -worldVec.y * scale;
                    const projZ = state.focalLength;

                    // Update the flattened mesh on the image plane
                    projPositions[i] = projX;
                    projPositions[i+1] = projY;
                    projPositions[i+2] = projZ;

                    // Update the projection rays (line from object vertex to projected vertex)
                    const lineIdx = (i / 3) * 6; 
                    linePositions[lineIdx] = worldVec.x;
                    linePositions[lineIdx+1] = worldVec.y;
                    linePositions[lineIdx+2] = worldVec.z;

                    linePositions[lineIdx+3] = projX;
                    linePositions[lineIdx+4] = projY;
                    linePositions[lineIdx+5] = projZ;
                }

                obj.projected.geometry.attributes.position.needsUpdate = true;
                obj.lines.geometry.attributes.position.needsUpdate = true;
            });
        }

        // 6. 2D HTML Label Tracking
        const labelPinhole = document.getElementById('label-pinhole');
        const labelImagePlane = document.getElementById('label-imageplane');
        const labelFocal = document.getElementById('label-focal');

        function updateLabels() {
            const widthHalf = window.innerWidth / 2;
            const heightHalf = window.innerHeight / 2;

            // Maps a 3D point to a 2D screen coordinate
            function getScreenPos(vector) {
                const vec = vector.clone();
                vec.project(camera);
                return {
                    x: (vec.x * widthHalf) + widthHalf,
                    y: -(vec.y * heightHalf) + heightHalf,
                    z: vec.z // Depth check to hide labels behind camera
                };
            }

            const pScreen = getScreenPos(new THREE.Vector3(0, -1.5, 0));
            labelPinhole.style.display = pScreen.z < 1 ? 'block' : 'none';
            labelPinhole.style.left = pScreen.x + 'px';
            labelPinhole.style.top = pScreen.y + 'px';

            const iScreen = getScreenPos(new THREE.Vector3(0, 16, state.focalLength));
            labelImagePlane.style.display = iScreen.z < 1 ? 'block' : 'none';
            labelImagePlane.style.left = iScreen.x + 'px';
            labelImagePlane.style.top = iScreen.y + 'px';

            const fScreen = getScreenPos(new THREE.Vector3(0, -1, state.focalLength / 2));
            labelFocal.style.display = fScreen.z < 1 ? 'block' : 'none';
            labelFocal.style.left = fScreen.x + 'px';
            labelFocal.style.top = fScreen.y + 'px';
            labelFocal.innerText = `Focal Length: ${state.focalLength.toFixed(1)} unit${state.focalLength === 1 ? '' : 's'}`;
        }

        // 7. Render Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateProjections();
            updateLabels();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
